profile:
  show: true
  order: 1
  title: Profile
  description: |
    Senior C++/Rust developer with 9 years of experience designing and delivering high-performance embedded systems, automotive platforms, and low-level software solutions. Deep expertise in C++11/14/17, Rust, and systems programming within real-time operating systems (QNX, Embedded Linux). Proven track record in the Automotive Diagnostic Domain, Adaptive AUTOSAR architectures, and low-level graphics engineering (Vulkan API). Passionate about software architecture, clean design patterns, and optimizing critical infrastructure for international markets.

experience:
  show: true
  order: 2
  title: Experiences
  description: |
    Professional work history and key technical milestones.
  items:
    - company: Luxoft
      link: '#'
      tags: Full-time
      date: 2023.01 - 2026.06
      role: Senior Software Developer
      location: Belgrade, Serbia
      description: |
        - Launch an internal software initiative focused on low-level graphics engineering and modern language capabilities (Rust/Vulkan).
        - Handle integration, testing, and porting of software frameworks and diagnostic services to new hardware platforms using QNX and Embedded Linux.
        - Design low-level interfaces for new hardware architectures and implement specialized adapters.
        - Utilize specialized ecosystems for Adaptive AUTOSAR applications and perform extensive static code analysis.

    - company: Luxoft
      link: '#'
      tags: Full-time
      date: 2021.09 - 2023.01
      role: Software Developer (Core Diagnostics & Architecture)
      location: Belgrade, Serbia
      description: |
        - Analyze software requirements and develop Software Detailed Designs (SDD) for core automotive diagnostic services.
        - Create component architectures and sequence diagrams for complex service logic within predefined interface constraints.
        - Fully implement application features and system services using embedded C++14.
        - Manage software release cycles, ensuring compliance with quality gates and ASPICE standards (SWE.2-SWE.6, SUP.8).
        - Develop comprehensive unit-test suites and mock-based frameworks to simulate system-level calls and error scenarios.

    - company: Luxoft
      link: '#'
      tags: Full-time
      date: 2018.07 - 2021.09
      role: Software Developer (Embedded Systems & CI/CD Infrastructure)
      location: St. Petersburg, Russia
      description: |
        - Develop core features, service architectures, and baselines for early-stage diagnostic service versions.
        - Manage the CI infrastructure, including maintaining Linux and Docker environments for cross-platform SDK support.
        - Write and optimize Jenkins-based CI/CD pipelines to streamline automated testing and release workflows.
        - Maintain Hardware-in-the-Loop (HIL) test setups and automated test execution on distributed Raspberry Pi target farms.
        - Develop internal Python scripting tools to automate release checklist verification and artifact generation.

    - company: State Research Institute of Applied Problems
      link: '#'
      tags: Full-time
      date: 2014.11 - 2018.07
      role: Software Engineer
      location: St. Petersburg, Russia
      description: |
        - Low-level development of communication protocols and firmware for ARM-based microcontrollers using pure C.
        - Design and implementation of data transmission protocols utilizing various physical interfaces, including SPI, UART, and USB.
        - Customization and maintenance of embedded Linux distributions using Buildroot and Yocto Project.
        - Configuration of bootloaders (U-Boot) and kernel-level optimizations, including custom module integration and peripheral management.
        - Development and modification of kernel-space and user-space drivers for Linux and Windows to enable hardware-software communication.
        - Signal analysis and protocol verification using hardware logic analyzers and software tools like Wireshark.
        - Research and development in Software Defined Radio (SDR) using GNU Radio, including the creation of custom processing blocks in Python and C++ for real-time performance.
        - Development of client applications (Windows) for data exchange and remote device management.
        - Debugging and validation of physical layer communication interfaces to ensure reliable data transfer in hardware-constrained environments.

